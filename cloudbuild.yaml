# Cloud Build Trigger Configuration
# Otomatik deployment için GitHub ile entegrasyon

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tracenet-blockchain:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tracenet-blockchain:latest'
      - '.'

  # Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tracenet-blockchain:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tracenet-blockchain:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tracenet-blockchain'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tracenet-blockchain:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=production,SUPABASE_URL=$$SUPABASE_URL,SUPABASE_ANON_KEY=$$SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY=$$SUPABASE_SERVICE_ROLE_KEY'
      - '--set-secrets'
      - 'JWT_SECRET=jwt-secret:latest,ENCRYPTION_KEY=encryption-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/tracenet-blockchain:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/tracenet-blockchain:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Trigger configuration
# This file will be used by Cloud Build trigger
timeout: '1200s'
