<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraceNet Explorer - Blockchain Gezgini</title>
    <meta name="description"
        content="TraceNet Blockchain Explorer - Tüm blokları, işlemleri ve ağ istatistiklerini görüntüleyin">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/explorer.css">
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="brand-section">
            <h1 class="brand-title">⛓️ TraceNet Explorer</h1>
            <div class="brand-subtitle">Blockchain Gezgini</div>
            <div class="brand-tagline">Tüm bloklar, işlemler ve hesaplar</div>

            <!-- Navigation -->
            <div id="navigation-container" data-page="explorer"></div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
        <div class="status-indicator"></div>
        <span id="statusText">⚡ Bağlanıyor...</span>
        <span class="status-detail" id="lastUpdate">Son güncelleme: -</span>
    </div>

    <div class="container">
        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput"
                    placeholder="🔍 Blok numarası, blok hash, işlem ID veya cüzdan adresi arayın...">
                <button class="search-btn" id="searchBtn">Ara</button>
            </div>
        </div>

        <!-- Network Statistics -->
        <section class="stats-grid">
            <div class="stat-card gradient-1">
                <div class="stat-icon">📦</div>
                <div class="stat-info">
                    <div class="stat-label">Toplam Blok</div>
                    <div class="stat-value" id="totalBlocks">-</div>
                    <div class="stat-trend">Genesis blok dahil</div>
                </div>
            </div>

            <div class="stat-card gradient-2">
                <div class="stat-icon">💸</div>
                <div class="stat-info">
                    <div class="stat-label">Toplam İşlem</div>
                    <div class="stat-value" id="totalTransactions">-</div>
                    <div class="stat-trend">Tüm ağ</div>
                </div>
            </div>

            <div class="stat-card gradient-3">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <div class="stat-label">Aktif Validator</div>
                    <div class="stat-value" id="activeValidators">-</div>
                    <div class="stat-trend">Online</div>
                </div>
            </div>

            <div class="stat-card gradient-4">
                <div class="stat-icon">💎</div>
                <div class="stat-info">
                    <div class="stat-label">Dağıtılan Token</div>
                    <div class="stat-value" id="distributedTokens">-</div>
                    <div class="stat-trend">TNN</div>
                </div>
            </div>
        </section>

        <!-- Blocks Explorer -->
        <section class="section" id="blocks">
            <div class="section-header">
                <h2 class="section-title">⛓️ Blockchain Blokları</h2>
            </div>

            <div class="blocks-container" id="blocksContainer">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Bloklar yükleniyor...</p>
                </div>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="/js/navigation.js"></script>
    <script src="/explorer.js"></script>
</body>

</html>
