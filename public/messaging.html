<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraceNet - Mesajlaşma Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .chat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .user-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .avatar.bob {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .user-info h2 {
            color: #333;
            margin-bottom: 5px;
        }

        .user-info .wallet {
            color: #666;
            font-size: 0.85rem;
            font-family: monospace;
        }

        .compose {
            margin: 20px 0;
        }

        .compose textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            resize: vertical;
            font-family: inherit;
            font-size: 1rem;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        .compose textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .compose button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            width: 100%;
        }

        .compose button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .compose button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .messages {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            min-height: 200px;
        }

        .message {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .message-sender {
            font-weight: 600;
            color: #667eea;
        }

        .message-time {
            color: #999;
        }

        .message-content {
            color: #333;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .message-meta {
            font-size: 0.75rem;
            color: #999;
        }

        .encrypted-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 8px;
        }

        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
            max-width: 400px;
        }

        .status.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @media (max-width: 768px) {
            .chat-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🔐 TraceNet Mesajlaşma</h1>
            <p>Blockchain tabanlı uçtan uca şifrelenmiş mesajlaşma demo</p>
        </header>

        <div class="chat-grid">
            <!-- Alice Panel -->
            <div class="user-panel">
                <div class="user-header">
                    <div class="avatar">A</div>
                    <div class="user-info">
                        <h2>Alice</h2>
                        <div class="wallet" id="alice-wallet">Yükleniyor...</div>
                    </div>
                </div>

                <div class="compose">
                    <h3 style="margin-bottom: 10px; color: #333;">✍️ Bob'a Mesaj Gönder</h3>
                    <textarea id="alice-message" placeholder="Mesajınızı yazın..."></textarea>
                    <button onclick="sendMessage('alice', 'bob')">🔒 Şifrele ve Gönder</button>
                </div>

                <div>
                    <h3 style="margin-bottom: 10px; color: #333;">📬 Gelen Mesajlar</h3>
                    <div class="messages" id="alice-messages">
                        <p style="text-align: center; color: #999; padding: 20px;">Henüz mesaj yok</p>
                    </div>
                </div>
            </div>

            <!-- Bob Panel -->
            <div class="user-panel">
                <div class="user-header">
                    <div class="avatar bob">B</div>
                    <div class="user-info">
                        <h2>Bob</h2>
                        <div class="wallet" id="bob-wallet">Yükleniyor...</div>
                    </div>
                </div>

                <div class="compose">
                    <h3 style="margin-bottom: 10px; color: #333;">✍️ Alice'e Mesaj Gönder</h3>
                    <textarea id="bob-message" placeholder="Mesajınızı yazın..."></textarea>
                    <button onclick="sendMessage('bob', 'alice')">🔒 Şifrele ve Gönder</button>
                </div>

                <div>
                    <h3 style="margin-bottom: 10px; color: #333;">📬 Gelen Mesajlar</h3>
                    <div class="messages" id="bob-messages">
                        <p style="text-align: center; color: #999; padding: 20px;">Henüz mesaj yok</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl-util/0.15.1/nacl-util.min.js"></script>

    <script>
        const API_URL = 'https://tracenet-blockchain-bbzxtm72vq-uc.a.run.app';

        const users = {
            alice: { wallet: null, keys: null },
            bob: { wallet: null, keys: null }
        };

        // Initialize
        async function init() {
            showStatus('🚀 Demo başlatılıyor...', 'info');

            try {
                // Generate keys
                users.alice.keys = nacl.box.keyPair();
                users.bob.keys = nacl.box.keyPair();

                // Set demo wallets
                users.alice.wallet = 'LT_alice_demo_' + Date.now();
                users.bob.wallet = 'LT_bob_demo_' + Date.now();

                // Update UI
                document.getElementById('alice-wallet').textContent =
                    users.alice.wallet.substring(0, 30) + '...';
                document.getElementById('bob-wallet').textContent =
                    users.bob.wallet.substring(0, 30) + '...';

                showStatus('✅ Demo hazır! Mesajlaşmaya başlayabilirsiniz.', 'success');
                setTimeout(hideStatus, 3000);
            } catch (error) {
                showStatus('❌ Hata: ' + error.message, 'error');
            }
        }

        // Encrypt message
        function encryptMessage(message, recipientPublicKey, senderPrivateKey) {
            const messageBytes = nacl.util.decodeUTF8(message);
            const nonce = nacl.randomBytes(24);
            const encrypted = nacl.box(messageBytes, nonce, recipientPublicKey, senderPrivateKey);

            return {
                encrypted: nacl.util.encodeBase64(encrypted),
                nonce: nacl.util.encodeBase64(nonce)
            };
        }

        // Send message
        async function sendMessage(from, to) {
            const textarea = document.getElementById(`${from}-message`);
            const message = textarea.value.trim();

            if (!message) {
                alert('Lütfen bir mesaj yazın!');
                return;
            }

            try {
                showStatus('🔒 Mesaj şifreleniyor...', 'info');

                // Encrypt
                const { encrypted, nonce } = encryptMessage(
                    message,
                    users[to].keys.publicKey,
                    users[from].keys.secretKey
                );

                // Create transaction
                const timestamp = Date.now();
                const tx = {
                    tx_id: `TX_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    from_wallet: users[from].wallet,
                    to_wallet: users[to].wallet,
                    type: 'MESSAGE_PAYMENT',
                    amount: 10000000,
                    fee: 1000000,
                    payload: {
                        encrypted_message: encrypted,
                        nonce: nonce,
                        message_type: 'encrypted',
                        timestamp: timestamp,
                        encrypted: true
                    },
                    timestamp: timestamp,
                    signatures: []
                };

                // Send to blockchain
                const response = await fetch(`${API_URL}/rpc/sendRawTx`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(tx)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                // Add to recipient's messages (simulated)
                addMessage(to, from, message, tx.tx_id);

                textarea.value = '';
                showStatus('✅ Mesaj gönderildi!', 'success');
                setTimeout(hideStatus, 2000);

            } catch (error) {
                console.error('Send error:', error);
                showStatus('❌ Mesaj gönderilemedi. Demo modunda çalışıyor.', 'error');

                // Fallback: add message anyway for demo
                const txId = `TX_demo_${Date.now()}`;
                addMessage(to, from, message, txId);
                textarea.value = '';
                setTimeout(hideStatus, 3000);
            }
        }

        // Add message to UI
        function addMessage(recipient, sender, content, txId) {
            const messagesDiv = document.getElementById(`${recipient}-messages`);

            // Remove empty message
            const emptyMsg = messagesDiv.querySelector('p');
            if (emptyMsg) {
                messagesDiv.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">
                        ${sender.toUpperCase()}
                        <span class="encrypted-badge">🔒 Encrypted</span>
                    </span>
                    <span class="message-time">${new Date().toLocaleTimeString('tr-TR')}</span>
                </div>
                <div class="message-content">${content}</div>
                <div class="message-meta">TX: ${txId.substring(0, 20)}...</div>
            `;

            messagesDiv.insertBefore(messageDiv, messagesDiv.firstChild);
        }

        // Show status
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type} show`;
        }

        // Hide status
        function hideStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.classList.remove('show');
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>

</html>
